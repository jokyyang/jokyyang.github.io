<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            background-image: url("santi-perez-render-final.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
        }
        </style>
    <script>
        window.onload = function(){
       
            alert("Welcome to our bulk Drink Store");
            let name = prompt("Enter your name:");
            let drinks = ["coffee","tea","water","soda","juice","milk","lemonade"];
            let item = prompt("What drink would you like? \n Only selecet one? \n (Coffee, Tea, Water, Soda, Juice, Milk, Lemonade)");
            item = item.toLowerCase();
            while(!drinks.includes(item))
{
    item = prompt("Sorry we don't have that drink. Please select one from the list: \n (Coffee, Tea, Water, Soda, Juice, Milk, Lemonade)");
    item = item.toLowerCase();
}
let quantity = prompt("How many box would you like?\n enter a number between 1 and 99\n one box contains 24 drinks");
quantity = parseInt(quantity);
while(quantity < 1 || quantity > 99 || isNaN(quantity))
{
    quantity = prompt("Invalid amount.\nPlease enter a number between 1 and 99");
    quantity = parseInt(quantity);
}

let now = new Date();
let hour = now.getHours();
let greeting;

if(hour < 12)
{
    greeting = "Good Morning";
}
else if(hour < 18)
{
    greeting = "Good Afternoon";
}
else
{
    greeting = "Good Evening";
}

let arrival = new Date();
arrival.setDate(arrival.getDate() + 7);
document.getElementById("output").innerHTML =
greeting + " " + name + ", Thank you for Ordering!<br><br>" +
"Drink Ordered: " + item + "<br>" +
"Quantity: " + quantity + "<br>" +
"Expected Arrival Date: " + arrival.toDateString();

}
</script>


</head>
<body>
    <h1>Order Confirmation</h1>

<p id="output"></p>

</body>
</html>
