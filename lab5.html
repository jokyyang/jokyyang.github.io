<div class="container">
    
    <div class="card p-4 shadow text-dark">
        <h2 class="text-center mb-4">car Register</h2>

        <h5>Owner Information</h5>
        <div class="mb-3">
            <label>First Name</label>
            <input type="text" id="firstName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Last Name</label>
            <input type="text" id="lastName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control">
        </div>

        <div class="mb-3">
            <label>Date of Birth</label>
            <input type="date" id="dob" class="form-control">
        </div>

        <h5 class="mt-4">Car Information</h5>

        <div class="mb-3">
            <label>Car Make</label>
            <input type="text" id="make" class="form-control">
        </div>

        <div class="mb-3">
            <label>Car Model</label>
            <input type="text" id="model" class="form-control">
        </div>

        <div class="mb-3">
            <label>Year</label>
            <input type="number" id="year" class="form-control">
        </div>

        <button onclick="registerUser()" class="btn btn-primary w-100">
            Register
        </button>

        <div id="output"></div>
    </div>
</div>
<script>
function registerUser() {

    let firstName = document.getElementById("firstName").value.trim();
    let lastName = document.getElementById("lastName").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let dob = document.getElementById("dob").value;

    let make = document.getElementById("make").value.trim();
    let model = document.getElementById("model").value.trim();
    let year = document.getElementById("year").value;

    let output = document.getElementById("output");
    if (!firstName || !lastName || !email || !password || !dob || !make || !model || !year) {
        output.innerHTML = `<div class="alert alert-danger">All fields must be filled!</div>`;
        return;
    }

    if (!(password.includes("!") || password.includes("?"))) {
        output.innerHTML = `<div class="alert alert-danger">Password must contain ! or ?</div>`;
        return;
    }

    let user = {
        firstName,
        lastName,
        email,
        password,
        dob,
        car: {
            make,
            model,
            year
            }
        };
    
        let maskedPassword = "*".repeat(user.password.length);


output.innerHTML = `
    <div class="alert alert-success">
        <h4>🚗 Registration Successful!</h4>
        <p><strong>Name:</strong> ${user.firstName} ${user.lastName}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <p><strong>Password:</strong> ${maskedPassword}</p>
        <p><strong>DOB:</strong> ${user.dob}</p>
        <hr>
        <p><strong>Car:</strong> ${user.car.year} ${user.car.make} ${user.car.model}</p>
    </div>
`;
}

  
</script>
